<!DOCTYPE html>
<html lang="es">
    <head>
        <title>Mi Primer Ejemplo CSS</title>
        <style>
            /* Aquí estoy usando selectores de tipo clase para aplicar estilos */
            .texto-verde {
                color: green;
            }
            .tamaño-grande {
                font-size: 45px;
            }
            /* Ahora uso selectores de tipo etiqueta o nombre */
            span {
                background: orange;
            }
            h1 {
                background: purple;
                color: white;
            }
        </style>
        <link rel="stylesheet" href="./css/style.css">
    </head>
    <body>
        <!-- En esta línea aplico estilos en línea, es decir, directamente en la etiqueta
        usando el atributo style para darle formato -->
        <p style="color: #07e312;
        font-size: 38px;
        font-weight: 700;">Hola Compañeros 
        Aplicados</p>
        <p class="texto-verde tamaño-grande"> Este es otro estilo diferente</p>
        <span>Yo soy un span con fondo de color</span>
        <h1>Bienvenidos</h1>
    </body>
</html>
